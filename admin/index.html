<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Admin...</title>
    <link rel="stylesheet" href="../shared/css/global.css?v=2.2">
    <style>
        body {
            background-color: #ffffff;
            color: #0047AB;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Satoshi', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }
        
        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        p {
            color: #0047AB;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
    <script>
        // Dynamic Redirect Logic
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const targetUrl = isLocal ? 'http://localhost:1337/admin' : 'https://cms.rlcadvocates.co.ke/admin';
        
        // Redirect after 5 seconds
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 5000);
    </script>
</head>
<body>
    <div class="loader-wrapper">
        <div class="loader"></div>
        <p>Redirecting to Admin Panel...</p>
    </div>
</body>
</html>
